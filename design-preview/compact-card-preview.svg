<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F8FC"/>
      <stop offset="1" stop-color="#EEF3FB"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1E40AF" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 28px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #0F172A; }
      .subtitle { font: 400 14px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #64748B; }
      .panel-title { font: 700 24px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #0F172A; }
      .card-title { font: 700 17px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #0F172A; }
      .card-body { font: 400 12px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #64748B; }
      .chip-text { font: 700 12px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #2563EB; }
      .badge-text { font: 700 11px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #0F172A; }
      .action-text { font: 700 13px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: white; }
      .note { font: 600 13px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #1D4ED8; }
      .small { font: 400 11px 'Segoe UI', 'Malgun Gothic', sans-serif; fill: #64748B; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>

  <text x="60" y="60" class="title">Compact Card Preview</text>
  <text x="60" y="88" class="subtitle">왼쪽 기능 리스트를 더 촘촘하게 구성하는 시안입니다. 유틸리티는 전체 compact, BQC는 핵심 카드 1개만 강조하는 방향입니다.</text>

  <rect x="40" y="120" width="730" height="790" rx="28" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2" filter="url(#shadow)"/>
  <text x="72" y="170" class="panel-title">유틸리티</text>
  <text x="72" y="198" class="subtitle">전체를 compact 리스트로 정리한 예시</text>

  <rect x="72" y="228" width="666" height="84" rx="18" fill="#F8FBFF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="92" y="248" width="48" height="28" rx="14" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="106" y="267" class="chip-text">DUP</text>
  <text x="156" y="264" class="card-title">중복/자체검토</text>
  <text x="156" y="287" class="card-body">중복 요소 그룹 검토와 자체간섭 검토를 한 화면에서 전환합니다.</text>
  <rect x="622" y="245" width="96" height="26" rx="13" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="644" y="263" class="chip-text">워크플로우</text>

  <rect x="72" y="328" width="666" height="84" rx="18" fill="#F8FBFF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="92" y="348" width="48" height="28" rx="14" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="108" y="367" class="chip-text">SP</text>
  <text x="156" y="364" class="card-title">공유 파라미터 연동</text>
  <text x="156" y="387" class="card-body">하위 패밀리에 공유 파라미터를 추가하고 연동 상태를 점검합니다.</text>
  <rect x="622" y="345" width="96" height="26" rx="13" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="644" y="363" class="chip-text">워크플로우</text>

  <rect x="72" y="428" width="666" height="84" rx="18" fill="#F8FBFF" stroke="#93C5FD" stroke-width="2"/>
  <rect x="92" y="448" width="48" height="28" rx="14" fill="#DBEAFE" stroke="#93C5FD" stroke-width="2"/>
  <text x="103" y="467" class="chip-text">PMS</text>
  <text x="156" y="464" class="card-title">PMS 검토</text>
  <text x="156" y="487" class="card-body">Segment 매핑 및 사이즈 검토를 빠르게 시작합니다.</text>
  <rect x="622" y="445" width="96" height="26" rx="13" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="644" y="463" class="chip-text">워크플로우</text>

  <rect x="72" y="528" width="666" height="66" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="92" y="551" width="18" height="18" rx="4" fill="#334155"/>
  <text x="126" y="555" class="card-title">공유파라미터 GUID 검토</text>
  <text x="126" y="577" class="card-body">프로젝트/패밀리 내 공유 파라미터 GUID 검토</text>

  <rect x="72" y="608" width="666" height="66" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="92" y="631" width="18" height="18" rx="4" fill="#334155"/>
  <text x="126" y="635" class="card-title">패밀리 공유파라미터 연동 검토</text>
  <text x="126" y="657" class="card-body">복합 패밀리의 하위 패밀리 연동 상태 점검</text>

  <rect x="72" y="688" width="666" height="66" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="92" y="711" width="18" height="18" rx="4" fill="#334155"/>
  <text x="126" y="715" class="card-title">Point 추출</text>
  <text x="126" y="737" class="card-body">Project/Survey 포인트 좌표 추출</text>

  <text x="72" y="792" class="note">포인트</text>
  <text x="72" y="816" class="small">설명은 1줄 또는 2줄까지만 보이고, 상세 단계는 선택 시만 펼치면 카드 높이를 많이 줄일 수 있습니다.</text>

  <rect x="812" y="120" width="748" height="790" rx="28" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="2" filter="url(#shadow)"/>
  <text x="844" y="170" class="panel-title">납품시 BQC 검토</text>
  <text x="844" y="198" class="subtitle">핵심 카드 1개는 강조, 나머지는 compact 리스트로 정리한 예시</text>

  <rect x="844" y="228" width="684" height="122" rx="22" fill="#EFF6FF" stroke="#60A5FA" stroke-width="2.5"/>
  <rect x="868" y="252" width="56" height="32" rx="16" fill="#DBEAFE" stroke="#60A5FA" stroke-width="2"/>
  <text x="882" y="273" class="chip-text">BQC</text>
  <text x="942" y="269" class="card-title">파라미터 값 연속성 검토</text>
  <text x="942" y="293" class="card-body">대표 기능은 조금 더 크게 두고, 설정 흐름과 현재 상태를 빠르게 파악할 수 있게 유지합니다.</text>
  <text x="942" y="316" class="card-body">공유 파라미터 선택 -> 허용 오차/비교 기준 설정 -> 실행 -> 결과 확인</text>
  <rect x="1398" y="250" width="106" height="28" rx="14" fill="#FFFFFF" stroke="#93C5FD" stroke-width="2"/>
  <text x="1427" y="269" class="chip-text">핵심 기능</text>

  <rect x="844" y="374" width="684" height="66" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="864" y="397" width="18" height="18" rx="4" fill="#334155"/>
  <text x="898" y="401" class="card-title">층/레벨 정보 검토</text>
  <text x="898" y="423" class="card-body">필수 보조 검토 항목은 compact row로 정리</text>
  <rect x="1413" y="391" width="84" height="22" rx="11" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="1437" y="406" class="badge-text">Sub</text>

  <rect x="844" y="454" width="684" height="66" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="864" y="477" width="18" height="18" rx="4" fill="#334155"/>
  <text x="898" y="481" class="card-title">연결 관계 검토</text>
  <text x="898" y="503" class="card-body">추가 보조 항목도 같은 높이로 통일</text>
  <rect x="1413" y="471" width="84" height="22" rx="11" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="1437" y="486" class="badge-text">Sub</text>

  <rect x="844" y="534" width="684" height="66" rx="16" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
  <rect x="864" y="557" width="18" height="18" rx="4" fill="#334155"/>
  <text x="898" y="561" class="card-title">좌표 보정 확인</text>
  <text x="898" y="583" class="card-body">설명은 짧게, 필요 시 우측 패널에 상세 정보 노출</text>
  <rect x="1413" y="551" width="84" height="22" rx="11" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/>
  <text x="1437" y="566" class="badge-text">Sub</text>

  <rect x="844" y="654" width="684" height="210" rx="22" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2"/>
  <text x="872" y="696" class="card-title">오른쪽 실행/상세 패널은 유지</text>
  <text x="872" y="724" class="card-body">왼쪽 리스트만 compact하게 줄이고, 자세한 설명과 실행 버튼은 오른쪽에서 계속 제공하면 사용성이 덜 떨어집니다.</text>
  <rect x="872" y="752" width="180" height="42" rx="16" fill="#2563EB"/>
  <text x="927" y="779" class="action-text">현재 파일 검토</text>
  <rect x="1068" y="752" width="180" height="42" rx="16" fill="#1D4ED8"/>
  <text x="1125" y="779" class="action-text">최근 결과 보기</text>
  <rect x="1264" y="752" width="188" height="42" rx="16" fill="#059669"/>
  <text x="1314" y="779" class="action-text">RVT 여러개 검토</text>
  <text x="872" y="824" class="small">핵심은 왼쪽은 선택 효율, 오른쪽은 정보 밀도 유지입니다.</text>
</svg>
